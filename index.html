<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đánh giá Tarot Nhà Chuột</title>

<style>

.review{
background:#1b1b1b;
margin-top:15px;
padding:15px;
border-radius:10px;
text-align:left;
border-left:4px solid gold;
}

body{
font-family: serif;
background: linear-gradient(135deg,#1a1a1a,#3a2b2b);
color:white;
text-align:center;
padding:40px;
}

.container{
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:20px;
max-width:600px;
margin:auto;
box-shadow:0 0 20px rgba(255,215,0,0.4);
}

h1{
color:gold;
}

.stars{
font-size:35px;
cursor:pointer;
}

.star{
color:gray;
}

.star.active{
color:gold;
}

textarea{
width:90%;
height:80px;
border-radius:10px;
border:none;
padding:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
cursor:pointer;
}

#reviews{
max-height:300px;
overflow-y:auto;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🐭 Đánh Giá Tarot Nhà Chuột</h1>

<p>Hãy đánh giá trải nghiệm của bạn</p>

<div class="stars">
<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>
</div>

<textarea id="note" placeholder="Viết cảm nhận của bạn (ẩn danh)..."></textarea>
<br>

<button onclick="submitReview()">Gửi đánh giá</button>

<h2>⭐ Điểm trung bình: <span id="avg">0</span>/5</h2>

<div id="reviews"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyClU5Z22MqkOAuaTtByZajWVLp8Ht-JB80",
authDomain: "danhgia-tarot-nhachuot.firebaseapp.com",
projectId: "danhgia-tarot-nhachuot",
storageBucket: "danhgia-tarot-nhachuot.firebasestorage.app",
messagingSenderId: "637805290312",
appId: "1:637805290312:web:5ab54a702f9d080389c97d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let rating = 0;

window.setRating = function(r){
rating=r
let stars=document.querySelectorAll(".star")
stars.forEach((s,i)=>{
s.classList.toggle("active",i<r)
})
}

window.submitReview = async function(){

if(rating==0){
alert("Vui lòng chọn số sao")
return
}

let note=document.getElementById("note").value

await addDoc(collection(db,"reviews"),{
rating:rating,
note:note
})

document.getElementById("note").value=""
rating=0
setRating(0)

loadReviews()

}

async function loadReviews(){

let snapshot = await getDocs(collection(db,"reviews"))

let container=document.getElementById("reviews")
container.innerHTML=""

let total=0
let count=0

snapshot.forEach(doc=>{

let r = doc.data()

total+=r.rating
count++

let div=document.createElement("div")
div.className="review"

div.innerHTML=`
<b>Ẩn danh</b><br>
⭐ ${"⭐".repeat(r.rating)}<br>
${r.note ? "💬 "+r.note : ""}
`

container.appendChild(div)

})

let avg=count? (total/count).toFixed(2):0
document.getElementById("avg").innerText=avg

}

loadReviews()

</script>

</body>
</html>
