<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Đánh Giá Tarot Nhà Chuột</title>

<style>

body{
font-family:serif;
background:linear-gradient(135deg,#0d0d0d,#2b1b1b);
color:white;
text-align:center;
padding:40px;
}

.container{
background:rgba(0,0,0,0.8);
padding:30px;
border-radius:20px;
max-width:650px;
margin:auto;
box-shadow:0 0 25px rgba(255,215,0,0.6);
}

h1{
color:gold;
}

.stars{
font-size:35px;
cursor:pointer;
}

.star{
color:gray;
}

.star.active{
color:gold;
}

textarea{
width:90%;
height:80px;
border-radius:10px;
border:none;
padding:10px;
margin-top:10px;
}

input[type=file]{
margin-top:10px;
}

button{
margin-top:10px;
padding:8px 16px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
cursor:pointer;
}

.review{
background:#1b1b1b;
margin-top:15px;
padding:15px;
border-radius:10px;
text-align:left;
border-left:4px solid gold;
}

.review img{
width:100%;
border-radius:10px;
margin-top:8px;
}

.time{
font-size:12px;
color:#ccc;
}

.reply{
color:#90ff90;
margin-top:5px;
}

.bar{
height:8px;
background:#444;
border-radius:5px;
margin:4px 0;
}

.fill{
height:8px;
background:gold;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔮 Đánh Giá Tarot Nhà Chuột</h1>

<p>Chia sẻ trải nghiệm của bạn</p>

<div class="stars">
<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>
</div>

<textarea id="note" placeholder="Viết cảm nhận..."></textarea>

<br>

<input type="file" id="image">

<br>

<button onclick="submitReview()">Gửi đánh giá</button>

<h2>
⭐ <span id="avg">0</span>/5
(<span id="count">0</span> đánh giá)
</h2>

<div id="chart"></div>

<div id="reviews"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyClU5Z22MqkOAuaTtByZajWVLp8Ht-JB80",
authDomain:"danhgia-tarot-nhachuot.firebaseapp.com",
projectId:"danhgia-tarot-nhachuot",
storageBucket:"danhgia-tarot-nhachuot.appspot.com"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)
const storage=getStorage(app)

let rating=0

const badWords=[
"địt","đụ","lồn","cặc","fuck","shit"
]

window.setRating=function(r){

rating=Math.min(r,5)

document.querySelectorAll(".star").forEach((s,i)=>{
s.classList.toggle("active",i<rating)
})

}

window.submitReview=async function(){

if(rating==0){
alert("Chọn số sao")
return
}

let note=document.getElementById("note").value

for(let w of badWords){

if(note.toLowerCase().includes(w)){
alert("Nội dung không phù hợp")
return
}

}

let last=localStorage.getItem("lastReview")

if(last && Date.now()-last<600000){
alert("Đợi 10 phút rồi hãy đánh giá tiếp")
return
}

let imageUrl=""

let file=document.getElementById("image").files[0]

if(file){

let storageRef=ref(storage,"reviews/"+Date.now())

await uploadBytes(storageRef,file)

imageUrl=await getDownloadURL(storageRef)

}

await addDoc(collection(db,"reviews"),{
rating:rating,
note:note,
reply:"",
image:imageUrl,
time:Date.now()
})

localStorage.setItem("lastReview",Date.now())

document.getElementById("note").value=""
document.getElementById("image").value=""

rating=0
setRating(0)

loadReviews()

}

window.replyReview=async function(id){

let text=prompt("Phản hồi của shop")

if(!text)return

const refDoc=doc(db,"reviews",id)

await updateDoc(refDoc,{reply:text})

loadReviews()

}

async function loadReviews(){

let snapshot=await getDocs(collection(db,"reviews"))

let arr=[]

snapshot.forEach(d=>{
arr.push({id:d.id,...d.data()})
})

arr.sort((a,b)=>b.time-a.time)

let container=document.getElementById("reviews")
container.innerHTML=""

let total=0
let count=0

let stat=[0,0,0,0,0]

arr.forEach(r=>{

let star=Math.min(r.rating,5)

stat[star-1]++

total+=star
count++

let date=new Date(r.time).toLocaleString("vi-VN")

let div=document.createElement("div")

div.className="review"

div.innerHTML=`

<b>Ẩn danh</b><br>

${"⭐".repeat(star)}<br>

${r.note?"💬 "+r.note+"<br>":""}

${r.image?`<img src="${r.image}">`:""}

<div class="time">🕒 ${date}</div>

${r.reply?`<div class="reply">🐭 Shop: ${r.reply}</div>`:""}

<button onclick="replyReview('${r.id}')">Phản hồi</button>

`

container.appendChild(div)

})

let avg=count?(total/count).toFixed(2):0

document.getElementById("avg").innerText=avg
document.getElementById("count").innerText=count

let chart=""

for(let i=5;i>=1;i--){

let percent=count?Math.round(stat[i-1]/count*100):0

chart+=`
${i}⭐
<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>
`

}

document.getElementById("chart").innerHTML=chart

}

loadReviews()

</script>

</body>
</html>
